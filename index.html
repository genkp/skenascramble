<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Group Randomizer - Live</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script
            defer
            src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
        ></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: "Inter", sans-serif;
                background-color: #f3f4f6;
            }
            .mobile-container {
                max-width: 480px;
                margin: 0 auto;
                min-height: 100vh;
                background: white;
            }
            [x-cloak] {
                display: none !important;
            }
        </style>
    </head>
    <body>
        <div
            class="mobile-container shadow-xl flex flex-col"
            x-data="app()"
            x-init="init()"
        >
            <header class="p-6 border-b sticky top-0 bg-white z-10">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-xl font-bold text-gray-800">
                            Acak Grup
                        </h1>
                        <p
                            class="text-xs text-gray-500"
                            x-text="isLoading ? 'Memuat data...' : 'Live Dashboard'"
                        ></p>
                    </div>
                    <button
                        @click="showLogin = true"
                        class="p-2 bg-gray-100 rounded-full hover:bg-gray-200"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-5 w-5 text-gray-600"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                            />
                        </svg>
                    </button>
                </div>
            </header>

            <div
                x-show="isLoading"
                class="p-10 text-center text-sm text-gray-500 flex flex-col items-center justify-center gap-2"
            >
                <div
                    class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"
                ></div>
                Memproses ke Google Sheets...
            </div>

            <main x-show="!isLoading" class="flex-grow p-5 space-y-6" x-cloak>
                <div class="relative">
                    <input
                        type="text"
                        x-model="searchQuery"
                        placeholder="Cari nomor (Contoh: B05 atau P10)"
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-400 focus:outline-none transition-all"
                    />
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 absolute left-3 top-3.5 text-gray-400"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                        />
                    </svg>
                </div>

                <template x-if="isAdmin">
                    <div
                        class="bg-blue-50 p-5 rounded-3xl border border-blue-100 space-y-4"
                        x-transition
                    >
                        <div class="flex justify-between items-center">
                            <h2 class="font-bold text-blue-800">Admin Panel</h2>
                            <button
                                @click="isAdmin = false"
                                class="text-xs text-blue-600 underline"
                            >
                                Logout
                            </button>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label
                                    class="text-[10px] font-bold text-gray-400 uppercase"
                                    >Total Biru (Cowok)</label
                                >
                                <input
                                    type="number"
                                    x-model="config.totalBlue"
                                    class="w-full p-2 border rounded-lg text-sm"
                                />
                            </div>
                            <div class="space-y-1">
                                <label
                                    class="text-[10px] font-bold text-gray-400 uppercase"
                                    >Total Pink (Cewek)</label
                                >
                                <input
                                    type="number"
                                    x-model="config.totalPink"
                                    class="w-full p-2 border rounded-lg text-sm"
                                />
                            </div>
                            <div class="space-y-1">
                                <label
                                    class="text-[10px] font-bold text-gray-400 uppercase"
                                    >Target per Grup</label
                                >
                                <input
                                    type="number"
                                    x-model="config.rule"
                                    class="w-full p-2 border rounded-lg text-sm"
                                />
                            </div>
                            <div class="space-y-1 col-span-2">
                                <label
                                    class="text-[10px] font-bold text-gray-400 uppercase text-red-500"
                                    >Kecuali Biru (Pisah Koma)</label
                                >
                                <input
                                    type="text"
                                    x-model="config.excludeBlue"
                                    placeholder="01, 02"
                                    class="w-full p-2 border rounded-lg text-sm"
                                />
                            </div>
                            <div class="space-y-1 col-span-2">
                                <label
                                    class="text-[10px] font-bold text-gray-400 uppercase text-red-500"
                                    >Kecuali Pink (Pisah Koma)</label
                                >
                                <input
                                    type="text"
                                    x-model="config.excludePink"
                                    placeholder="01"
                                    class="w-full p-2 border rounded-lg text-sm"
                                />
                            </div>
                        </div>

                        <button
                            @click="generateGroups()"
                            class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-blue-200"
                        >
                            Acak Sekarang
                        </button>
                    </div>
                </template>

                <div class="space-y-4">
                    <template
                        x-for="(members, groupName) in filteredGroups"
                        :key="groupName"
                    >
                        <div
                            class="border border-gray-100 rounded-3xl overflow-hidden shadow-sm"
                        >
                            <div
                                class="bg-gray-50 px-5 py-3 border-b border-gray-100 flex justify-between items-center"
                            >
                                <span
                                    class="font-bold text-gray-700"
                                    x-text="groupName"
                                ></span>
                                <span
                                    class="text-[10px] px-2 py-1 bg-white rounded-full text-gray-400 border uppercase"
                                    x-text="members.length + ' Orang'"
                                ></span>
                            </div>
                            <div class="p-3 grid grid-cols-4 gap-2">
                                <template
                                    x-for="person in members"
                                    :key="person.id"
                                >
                                    <div
                                        @click="handlePersonClick(person)"
                                        :class="{
                                    'bg-blue-500 text-white': person.type === 'Biru',
                                    'bg-pink-500 text-white': person.type === 'Pink',
                                    'bg-gray-400 text-white': person.group === 'PANITIA',
                                    'ring-4 ring-yellow-400 ring-offset-2': isSelected(person)
                                }"
                                        class="aspect-square flex flex-col items-center justify-center rounded-2xl transition-all cursor-pointer"
                                    >
                                        <span
                                            class="text-xs font-bold"
                                            x-text="person.type === 'Biru' ? 'B' : 'P'"
                                        ></span>
                                        <span
                                            class="text-lg font-bold"
                                            x-text="person.num"
                                        ></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </main>

            <template x-if="isAdmin && selectedPeople.length > 0">
                <div
                    class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[400px] bg-gray-900 text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center"
                    x-transition
                >
                    <div class="text-xs font-medium">
                        Terpilih: <span x-text="selectedPeople.length"></span>/2
                    </div>
                    <div class="flex gap-2">
                        <button
                            @click="selectedPeople = []"
                            class="px-3 py-1 text-xs bg-gray-700 rounded-lg"
                        >
                            Batal
                        </button>
                        <button
                            x-show="selectedPeople.length === 2"
                            @click="swapAction()"
                            class="px-4 py-1 text-xs bg-blue-500 font-bold rounded-lg uppercase"
                        >
                            Swap
                        </button>
                    </div>
                </div>
            </template>

            <div
                x-show="showLogin"
                x-cloak
                class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-6"
            >
                <div
                    @click.away="showLogin = false"
                    class="bg-white w-full max-w-xs p-6 rounded-3xl space-y-4"
                >
                    <h3 class="text-center font-bold text-gray-800">
                        Admin Login
                    </h3>
                    <input
                        type="password"
                        x-model="passwordInput"
                        placeholder="Password"
                        class="w-full p-3 border rounded-xl focus:outline-none"
                    />
                    <button
                        @click="login()"
                        class="w-full py-3 bg-gray-900 text-white rounded-xl font-bold"
                    >
                        Masuk
                    </button>
                </div>
            </div>
        </div>

        <script>
            function app() {
                return {
                    apiUrl: "", // Akan diisi di fungsi init()
                    adminPassword: "admin123", // Samakan dengan Backend
                    isAdmin: false,
                    showLogin: false,
                    isLoading: false,
                    passwordInput: "",
                    searchQuery: "",
                    selectedPeople: [],

                    config: {
                        totalBlue: 43,
                        totalPink: 61,
                        rule: 6,
                        excludeBlue: "",
                        excludePink: "",
                    },

                    participants: [],

                    init() {
                        // ⚠️ GANTI STRING DI BAWAH INI DENGAN URL WEB APP APPS SCRIPT ANDA
                        this.apiUrl =
                            "https://script.google.com/macros/s/AKfycbwhLH42_tmqieR-cjiANvkjpFSlKF1AJmJZlfuM24v0pFAHFOwGMcc3NboHt53XTYztKg/exec";
                        this.fetchData();
                    },

                    async fetchData() {
                        this.isLoading = true;
                        try {
                            const response = await fetch(this.apiUrl);
                            const result = await response.json();
                            if (result.status === "success") {
                                this.participants = result.data;
                            }
                        } catch (error) {
                            alert("Gagal mengambil data dari server");
                            console.error(error);
                        } finally {
                            this.isLoading = false;
                        }
                    },

                    login() {
                        if (this.passwordInput === this.adminPassword) {
                            this.isAdmin = true;
                            this.showLogin = false;
                            this.passwordInput = "";
                        } else {
                            alert("Password Salah!");
                        }
                    },

                    get filteredGroups() {
                        let filtered = this.participants;
                        if (this.searchQuery) {
                            const query = this.searchQuery.toLowerCase();
                            filtered = this.participants.filter((p) => {
                                const code =
                                    (p.type === "Biru" ? "B" : "P") + p.num;
                                return code.toLowerCase().includes(query);
                            });
                        }

                        return filtered.reduce((groups, person) => {
                            if (!groups[person.group])
                                groups[person.group] = [];
                            groups[person.group].push(person);

                            // SORT LOGIC: Urutkan Otomatis (Biru duluan, baru nomor urut)
                            groups[person.group].sort((a, b) => {
                                if (a.type !== b.type)
                                    return a.type === "Biru" ? -1 : 1;
                                return parseInt(a.num) - parseInt(b.num);
                            });

                            return groups;
                        }, {});
                    },

                    handlePersonClick(person) {
                        if (!this.isAdmin || person.group === "PANITIA") return; // Panitia gak bisa di-swap

                        if (this.isSelected(person)) {
                            this.selectedPeople = this.selectedPeople.filter(
                                (p) => p.id !== person.id,
                            );
                        } else {
                            if (this.selectedPeople.length < 2) {
                                this.selectedPeople.push(person);
                            }
                        }
                    },

                    isSelected(person) {
                        return this.selectedPeople.some(
                            (p) => p.id === person.id,
                        );
                    },

                    async swapAction() {
                        if (this.selectedPeople.length !== 2) return;
                        this.isLoading = true;

                        const [p1, p2] = this.selectedPeople;
                        const payload = {
                            password: this.adminPassword,
                            action: "SWAP",
                            swapData: {
                                p1_type: p1.type,
                                p1_num: p1.num,
                                p2_type: p2.type,
                                p2_num: p2.num,
                            },
                        };

                        try {
                            const response = await fetch(this.apiUrl, {
                                method: "POST",
                                body: JSON.stringify(payload),
                            });
                            const result = await response.json();
                            if (result.status === "success") {
                                // Update lokal data agar instan terasa tanpa loading total
                                const g1 = p1.group;
                                const g2 = p2.group;
                                this.participants = this.participants.map(
                                    (p) => {
                                        if (p.id === p1.id)
                                            return { ...p, group: g2 };
                                        if (p.id === p2.id)
                                            return { ...p, group: g1 };
                                        return p;
                                    },
                                );
                                this.selectedPeople = [];
                            } else {
                                alert(result.message);
                            }
                        } catch (error) {
                            alert("Koneksi gagal saat memproses swap.");
                        } finally {
                            this.isLoading = false;
                        }
                    },

                    async generateGroups() {
                        if (
                            !confirm(
                                "Apakah Anda yakin ingin mengacak ulang? Semua hasil swap sebelumnya akan hilang.",
                            )
                        )
                            return;
                        this.isLoading = true;

                        const payload = {
                            password: this.adminPassword,
                            action: "GENERATE",
                            config: this.config,
                        };

                        try {
                            const response = await fetch(this.apiUrl, {
                                method: "POST",
                                body: JSON.stringify(payload),
                            });
                            const result = await response.json();
                            if (result.status === "success") {
                                alert(result.message);
                                this.fetchData(); // Muat ulang data terbaru hasil acakan
                            } else {
                                alert(result.message);
                            }
                        } catch (error) {
                            alert("Koneksi gagal saat memproses pengacakan.");
                        } finally {
                            this.isLoading = false;
                        }
                    },
                };
            }
        </script>
    </body>
</html>
