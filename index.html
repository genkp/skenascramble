<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dashboard - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; padding-bottom: 80px; }
        .mobile-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: white; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>

<div class="mobile-container shadow-xl flex flex-col min-h-screen relative" x-data="app()" x-init="init()">
    
    <header class="p-5 border-b sticky top-0 bg-white z-10 flex justify-between items-center">
        <div>
            <h1 class="text-base font-bold text-gray-800" x-text="config && config.title ? config.title : 'Memuat Event...'">Memuat...</h1>
            <p class="text-[11px] text-gray-500" x-text="isLoading ? 'Sinkronisasi server...' : 'Live System'"></p>
        </div>
        <div class="flex items-center gap-2">
            <button x-show="isAdmin && currentTab === 'grup'" @click="showPanelConfig = !showPanelConfig" 
                class="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors" :class="showPanelConfig ? 'text-blue-600 bg-blue-50' : 'text-gray-600'">
                <template x-if="showPanelConfig">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                    </svg>
                </template>
                <template x-if="!showPanelConfig">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </template>
            </button>

            <button @click="isAdmin ? logout() : showLogin = true" 
                :class="isAdmin ? 'bg-red-50 text-red-600 hover:bg-red-100' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                class="p-2 rounded-full transition-colors">
                <template x-if="!isAdmin">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </template>
                <template x-if="isAdmin">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </template>
            </button>
        </div>
    </header>

    <div x-show="isLoading" class="p-3 bg-yellow-50 text-yellow-700 text-center text-xs font-semibold animate-pulse">
        Sedang menyelaraskan data dengan Google Sheets...
    </div>

    <main class="flex-grow p-4 pb-24 space-y-4" x-cloak>
        
        <div x-show="currentTab === 'grup'" class="space-y-4">
            <div class="grid grid-cols-3 gap-2.5">
                <div class="bg-blue-50 border border-blue-100 p-2.5 rounded-xl text-center">
                    <p class="text-[9px] uppercase font-bold text-blue-400 tracking-wider">Putra / Biru</p>
                    <p class="text-lg font-bold text-blue-700" x-text="stats.blueCount"></p>
                </div>
                <div class="bg-pink-50 border border-pink-100 p-2.5 rounded-xl text-center">
                    <p class="text-[9px] uppercase font-bold text-pink-400 tracking-wider">Putri / Pink</p>
                    <p class="text-lg font-bold text-pink-700" x-text="stats.pinkCount"></p>
                </div>
                <div class="bg-purple-50 border border-purple-100 p-2.5 rounded-xl text-center">
                    <p class="text-[9px] uppercase font-bold text-purple-400 tracking-wider">Total Grup</p>
                    <p class="text-lg font-bold text-purple-700" x-text="stats.groupCount"></p>
                </div>
            </div>

            <div class="relative">
                <input type="text" x-model="searchQuery" placeholder="Cari nomor gelang atau nama grup..." 
                    class="w-full pl-9 pr-4 py-2.5 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 top-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>

            <div x-show="isAdmin && showPanelConfig" x-transition class="bg-gray-50 p-4 rounded-2xl border border-gray-200 space-y-3">
                <h2 class="font-bold text-xs text-gray-700 uppercase tracking-wide">Konfigurasi Pengacakan</h2>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Custom Judul Event</label>
                    <div class="flex gap-2">
                        <input type="text" x-model="config.title" class="flex-grow p-2 border rounded-lg text-sm bg-white focus:outline-none focus:border-blue-400">
                        <button @click="saveTitleOnly()" class="px-3 py-2 bg-gray-800 text-white rounded-lg font-bold text-xs shrink-0 hover:bg-gray-900 transition-colors">
                            Simpan Judul
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Total Biru</label>
                        <input type="number" x-model="config.totalBlue" class="w-full p-2 border rounded-lg text-sm bg-white">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Total Pink</label>
                        <input type="number" x-model="config.totalPink" class="w-full p-2 border rounded-lg text-sm bg-white">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Rule/Grup</label>
                        <input type="number" x-model="config.rule" class="w-full p-2 border rounded-lg text-sm bg-white">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-red-400 uppercase">Kecuali Biru (Panitia)</label>
                        <input type="text" x-model="config.excludeBlue" placeholder="01,02" class="w-full p-2 border rounded-lg text-xs bg-white">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-red-400 uppercase">Kecuali Pink (Panitia)</label>
                        <input type="text" x-model="config.excludePink" placeholder="01,02" class="w-full p-2 border rounded-lg text-xs bg-white">
                    </div>
                </div>
                <button @click="generateGroups()" class="w-full py-2.5 bg-blue-600 text-white rounded-xl font-bold text-xs shadow-sm uppercase tracking-wider hover:bg-blue-700 transition-colors">
                    Acak & Simpan Baru
                </button>
            </div>

            <div class="space-y-2">
                <template x-for="(members, groupName) in filteredGroups" :key="groupName">
                    <div class="bg-white border border-gray-100 rounded-xl p-3 flex items-center justify-between gap-3 shadow-sm">
                        
                        <div class="flex flex-col min-w-[75px] shrink-0">
                            <span class="font-bold text-sm text-gray-700 tracking-tight" x-text="groupName"></span>
                            <span class="text-[10px] text-gray-400 font-medium" x-text="members.length + ' Anggota'"></span>
                        </div>
                        
                        <div class="flex flex-wrap gap-1.5 justify-end flex-grow">
                            <template x-for="person in members" :key="person.id">
                                <div @click="handlePersonClick(person)" 
                                    :class="{
                                        'bg-blue-500 text-white': person.type === 'Biru' && person.group !== 'PANITIA',
                                        'bg-pink-500 text-white': person.type === 'Pink' && person.group !== 'PANITIA',
                                        'bg-gray-400 text-white': person.group === 'PANITIA',
                                        'ring-2 ring-yellow-400 ring-offset-1 scale-95 z-10': isSelected(person)
                                    }"
                                    class="w-9 h-9 flex items-center justify-center rounded-lg text-xs font-bold transition-all cursor-pointer shadow-sm select-none">
                                    <span x-text="person.num"></span>
                                </div>
                            </template>
                        </div>

                    </div>
                </template>
            </div>
        </div>

        <div x-show="currentTab === 'rundown'" class="space-y-4" x-cloak>
            <div class="flex justify-between items-center">
                <h2 class="text-base font-bold text-gray-800">Agenda Acara</h2>
                
                <div x-show="isAdmin" class="flex gap-2">
                    <button @click="isEditRundownMode = !isEditRundownMode" 
                        :class="isEditRundownMode ? 'bg-gray-500 text-white' : 'bg-blue-600 text-white'"
                        class="px-3 py-1.5 font-bold text-xs rounded-lg shadow-sm transition-colors">
                        <span x-text="isEditRundownMode ? 'Batal Edit' : 'Edit Rundown'"></span>
                    </button>
                    <button x-show="isEditRundownMode" @click="saveRundown()" class="px-3 py-1.5 bg-green-600 text-white font-bold text-xs rounded-lg shadow-sm">
                        Simpan Rundown
                    </button>
                </div>
            </div>

            <div class="space-y-4 border-l-2 border-gray-200 ml-2 pl-4">
                <template x-for="(item, index) in rundown" :key="index">
                    <div class="relative space-y-1">
                        <div class="absolute -left-[23px] top-1.5 w-2.5 h-2.5 bg-blue-500 rounded-full border-2 border-white"></div>
                        
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 space-y-1">
                            <div class="flex gap-2 items-center">
                                <template x-if="!isEditRundownMode">
                                    <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded" x-text="item.day"></span>
                                </template>
                                <template x-if="isEditRundownMode">
                                    <input type="text" x-model="item.day" class="text-xs border p-1 rounded font-bold text-blue-600 bg-white w-1/2">
                                </template>
                                
                                <template x-if="!isEditRundownMode">
                                    <span class="text-[10px] font-bold text-gray-500" x-text="item.time"></span>
                                </template>
                                <template x-if="isEditRundownMode">
                                    <input type="text" x-model="item.time" class="text-xs border p-1 rounded font-bold text-gray-500 bg-white w-1/2">
                                </template>
                            </div>
                            
                            <template x-if="!isEditRundownMode">
                                <p class="text-xs text-gray-700 whitespace-pre-line font-medium pt-0.5" x-text="item.activity"></p>
                            </template>
                            <template x-if="isEditRundownMode">
                                <textarea x-model="item.activity" rows="2" class="w-full text-xs border p-1.5 mt-1 rounded bg-white"></textarea>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>

    </main>

    <template x-if="isAdmin && selectedPeople.length > 0 && currentTab === 'grup'">
        <div class="fixed bottom-20 left-1/2 -translate-x-1/2 w-[90%] max-w-[400px] bg-gray-900 text-white p-3.5 rounded-xl shadow-2xl flex justify-between items-center z-40" x-transition>
            <div class="text-xs font-semibold">Terpilih: <span class="text-yellow-400" x-text="selectedPeople.length"></span>/2 orang</div>
            <div class="flex gap-2">
                <button @click="selectedPeople = []" class="px-2.5 py-1 text-xs bg-gray-700 rounded-lg">Batal</button>
                <button x-show="selectedPeople.length === 2" @click="swapAction()" class="px-3 py-1 text-xs bg-blue-500 font-bold rounded-lg uppercase tracking-wider">Swap</button>
            </div>
        </div>
    </template>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white border-t flex justify-around p-2.5 z-30 shadow-lg">
        <button @click="currentTab = 'grup'" :class="currentTab === 'grup' ? 'text-blue-600 font-bold' : 'text-gray-400'" class="flex flex-col items-center gap-0.5 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span class="text-[10px]">Daftar Grup</span>
        </button>
        <button @click="currentTab = 'rundown'" :class="currentTab === 'rundown' ? 'text-blue-600 font-bold' : 'text-gray-400'" class="flex flex-col items-center gap-0.5 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span class="text-[10px]">Rundown</span>
        </button>
    </nav>

    <div x-show="showLogin" x-cloak class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-6">
        <div @click.away="showLogin = false" class="bg-white w-full max-w-xs p-5 rounded-2xl space-y-3">
            <h3 class="text-center font-bold text-sm text-gray-800">Admin Login</h3>
            <input type="password" x-model="passwordInput" placeholder="Masukkan Password" class="w-full p-2.5 border text-sm rounded-xl focus:outline-none focus:border-blue-500">
            <button @click="login()" class="w-full py-2.5 bg-gray-900 text-white text-sm rounded-xl font-bold">Masuk</button>
        </div>
    </div>

</div>

<script>
function app() {
    return {
        apiUrl: '',
        isAdmin: false,
        showLogin: false,
        showPanelConfig: true,
        isEditRundownMode: false, 
        isLoading: false,
        currentTab: 'grup', 
        passwordInput: '',
        adminPassword: '', 
        searchQuery: '',
        selectedPeople: [],
        
        config: { title: 'Memuat Judul...', totalBlue: 0, totalPink: 0, rule: 6, excludeBlue: '', excludePink: '' },
        stats: { blueCount: 0, pinkCount: 0, groupCount: 0 },
        participants: [],
        rundown: [],

        init() {
            this.apiUrl = 'https://script.google.com/macros/s/AKfycbwhLH42_tmqieR-cjiANvkjpFSlKF1AJmJZlfuM24v0pFAHFOwGMcc3NboHt53XTYztKg/exec';
            
            // Cek status login dari LocalStorage saat pertama kali dimuat
            const savedPassword = localStorage.getItem('admin_session_password');
            if (savedPassword) {
                this.adminPassword = savedPassword;
                this.isAdmin = true;
            }

            this.fetchData();
        },

        async fetchData() {
            this.isLoading = true;
            try {
                const response = await fetch(this.apiUrl);
                const result = await response.json();
                if (result.status === "success") {
                    this.participants = result.data.participants || [];
                    this.config = result.data.config || this.config;
                    this.rundown = result.data.rundown || [];
                    this.calculateStats();
                }
            } catch (error) {
                console.error(error);
                alert("Gagal sinkronisasi data dari Google Sheets.");
            } finally {
                this.isLoading = false;
            }
        },

        calculateStats() {
            if (!this.participants) return;
            const murni = this.participants.filter(p => p.group !== 'PANITIA');
            this.stats.blueCount = murni.filter(p => p.type === 'Biru').length;
            this.stats.pinkCount = murni.filter(p => p.type === 'Pink').length;
            
            const uniqueGroups = new Set(murni.map(p => p.group));
            this.stats.groupCount = uniqueGroups.size;
        },

        login() {
            if (this.passwordInput.trim() !== "") {
                this.adminPassword = this.passwordInput; 
                this.isAdmin = true;
                this.showLogin = false;
                this.showPanelConfig = true;
                
                // Simpan password ke LocalStorage agar persistent
                localStorage.setItem('admin_session_password', this.adminPassword);
                
                this.passwordInput = '';
            } else {
                alert('Password tidak boleh kosong!');
            }
        },

        logout() {
            if(confirm("Apakah Anda ingin logout dari mode Admin?")) {
                this.isAdmin = false;
                this.isEditRundownMode = false;
                this.adminPassword = '';
                this.selectedPeople = [];
                
                // Hapus token session dari LocalStorage
                localStorage.removeItem('admin_session_password');
            }
        },

        get filteredGroups() {
            let filtered = this.participants;
            if (this.searchQuery) {
                const query = this.searchQuery.toLowerCase();
                const matchedGroupNames = new Set();
                
                this.participants.forEach(p => {
                    const code = (p.type === 'Biru' ? 'B' : 'P') + p.num;
                    if (code.toLowerCase().includes(query) || p.group.toLowerCase().includes(query)) {
                        matchedGroupNames.add(p.group);
                    }
                });

                filtered = this.participants.filter(p => matchedGroupNames.has(p.group));
            }

            return filtered.reduce((groups, person) => {
                if (!groups[person.group]) groups[person.group] = [];
                groups[person.group].push(person);

                groups[person.group].sort((a, b) => {
                    if (a.type !== b.type) return a.type === 'Biru' ? -1 : 1;
                    return parseInt(a.num) - parseInt(b.num);
                });
                return groups;
            }, {});
        },

        handlePersonClick(person) {
            if (!this.isAdmin || person.group === 'PANITIA') return;
            if (this.isSelected(person)) {
                this.selectedPeople = this.selectedPeople.filter(p => p.id !== person.id);
            } else {
                if (this.selectedPeople.length < 2) this.selectedPeople.push(person);
            }
        },

        isSelected(person) {
            return this.selectedPeople.some(p => p.id === person.id);
        },

        async swapAction() {
            if (this.selectedPeople.length !== 2) return;
            this.isLoading = true;
            
            const [p1, p2] = this.selectedPeople;
            const payload = {
                password: this.adminPassword,
                action: "SWAP",
                swapData: { p1_type: p1.type, p1_num: p1.num, p2_type: p2.type, p2_num: p2.num }
            };

            try {
                const response = await fetch(this.apiUrl, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                if (result.status === "success") {
                    const g1 = p1.group; const g2 = p2.group;
                    this.participants = this.participants.map(p => {
                        if (p.id === p1.id) return { ...p, group: g2 };
                        if (p.id === p2.id) return { ...p, group: g1 };
                        return p;
                    });
                    this.selectedPeople = [];
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert("Gagal memproses swap.");
            } finally {
                this.isLoading = false;
            }
        },

        async saveTitleOnly() {
            this.isLoading = true;
            try {
                const response = await fetch(this.apiUrl, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        password: this.adminPassword, 
                        action: "GENERATE", 
                        config: this.config 
                    })
                });
                const result = await response.json();
                if (result.status === "success") {
                    alert("Judul Event berhasil diperbarui!");
                    this.fetchData();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert("Gagal menyimpan judul event.");
            } finally {
                this.isLoading = false;
            }
        },

        async generateGroups() {
            if (!confirm("Acak ulang kelompok? Judul kustom & hasil swap lama akan disesuaikan database baru.")) return;
            this.isLoading = true;

            try {
                const response = await fetch(this.apiUrl, {
                    method: 'POST',
                    body: JSON.stringify({ password: this.adminPassword, action: "GENERATE", config: this.config })
                });
                const result = await response.json();
                if (result.status === "success") {
                    alert(result.message);
                    this.fetchData();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert("Gagal memproses pengacakan.");
            } finally {
                this.isLoading = false;
            }
        },

        async saveRundown() {
            this.isLoading = true;
            try {
                const response = await fetch(this.apiUrl, {
                    method: 'POST',
                    body: JSON.stringify({ password: this.adminPassword, action: "SAVE_RUNDOWN", rundown: this.rundown })
                });
                const result = await response.json();
                alert(result.message);
                if (result.status === "success") {
                    this.isEditRundownMode = false; 
                }
            } catch (error) {
                alert("Gagal menyimpan Rundown ke server.");
            } finally {
                this.isLoading = false;
            }
        }
    }
}
</script>

</body>
</html>
