<!doctype html>
<html lang="id" class="bg-gray-100">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>Event Dashboard - Mobile</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
        <style>
            body { font-family: "Inter", sans-serif; }
            .mobile-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #ffffff; }
            [x-cloak] { display: none !important; }
        </style>
    </head>
    <body class="bg-gray-100 antialiased">
        <div class="mobile-container shadow-xl flex flex-col min-h-screen relative" x-data="app()" x-init="init()">
            
            <header class="p-5 border-b sticky top-0 bg-white z-50 flex justify-between items-center shadow-sm">
                <div>
                    <h1 class="text-base font-bold text-gray-800 tracking-tight" x-text="config.title">Event Dashboard</h1>
                    <p class="text-[10px] text-gray-400 font-medium" x-text="isAdmin ? 'Mode Administrasi' : 'Mode Peserta (Mobile UI)'"></p>
                </div>
                <div>
                    <button @click="toggleAdminMode()" class="text-[11px] font-bold px-3 py-1.5 rounded-xl border transition-all"
                        :class="isAdmin ? 'bg-red-50 text-red-600 border-red-200 hover:bg-red-100' : 'bg-gray-50 text-gray-600 border-gray-200 hover:bg-gray-100'">
                        <span x-text="isAdmin ? '🔒 Keluar Admin' : '🔑 Login Admin'"></span>
                    </button>
                </div>
            </header>

            <div x-show="isLoading" x-cloak class="absolute inset-0 bg-white/70 backdrop-blur-sm z-50 flex flex-col justify-center items-center gap-3">
                <div class="animate-spin rounded-full h-8 w-8 border-4 border-indigo-600 border-t-transparent"></div>
                <p class="text-xs font-semibold text-gray-500 animate-pulse">Memproses Data...</p>
            </div>

            <main class="flex-1 p-5 pb-24 overflow-y-auto">
                
                <div x-show="currentTab === 'generator'" class="space-y-4">
                    <div x-show="isAdmin" class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
                        <h3 class="text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Konfigurasi Pengacakan</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Total Biru</label>
                                <input type="number" x-model.number="config.totalBlue" class="w-full text-xs font-semibold p-2 border rounded-xl" />
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Total Pink</label>
                                <input type="number" x-model.number="config.totalPink" class="w-full text-xs font-semibold p-2 border rounded-xl" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nomor Dikecualikan (Biru)</label>
                            <input type="text" x-model="config.excludeBlue" placeholder="Contoh: 5,12,23" class="w-full text-xs p-2 border rounded-xl" />
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nomor Dikecualikan (Pink)</label>
                            <input type="text" x-model="config.excludePink" placeholder="Contoh: 2,17" class="w-full text-xs p-2 border rounded-xl" />
                        </div>
                        <div class="pt-2">
                            <button @click="generateGroups()" class="w-full bg-indigo-600 text-white text-xs font-bold py-2.5 rounded-xl uppercase tracking-wider shadow-sm hover:bg-indigo-700 active:scale-[0.99] transition-transform">
                                🎲 Acak & Sinkronkan Kelompok
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <div class="relative">
                            <input type="text" x-model="searchQuery" placeholder="Cari ID Peserta (Contoh: B12 atau P4)..." class="w-full text-xs pl-9 pr-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 shadow-sm" />
                            <span class="absolute left-3.5 top-3 text-gray-400 text-xs">🔍</span>
                        </div>
                        
                        <div x-show="isAdmin" class="bg-amber-50/60 border border-amber-200/70 rounded-xl p-3 flex flex-col gap-2">
                            <span class="text-[10px] font-bold text-amber-800 uppercase tracking-wide">⚙️ Panel Tukar Grup (Swap)</span>
                            <div class="flex gap-2 items-center">
                                <input type="text" x-model="swapP1" placeholder="ID 1 (B1)" class="w-full text-xs p-2 border rounded-lg bg-white uppercase font-bold" />
                                <span class="text-xs text-amber-500 font-bold">⇄</span>
                                <input type="text" x-model="swapP2" placeholder="ID 2 (P10)" class="w-full text-xs p-2 border rounded-lg bg-white uppercase font-bold" />
                                <button @click="executeSwap()" class="bg-amber-600 text-white text-xs font-bold px-4 py-2 rounded-lg hover:bg-amber-700">Tukar</button>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <template x-for="p in filteredParticipants" :key="p.id">
                            <div class="flex justify-between items-center p-3 rounded-xl border border-gray-100 shadow-sm"
                                :class="p.type === 'B' ? 'bg-gradient-to-r from-blue-50/60 to-white' : 'bg-gradient-to-r from-pink-50/60 to-white'">
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-black px-2.5 py-1 rounded-lg text-white shadow-sm shrink-0"
                                        :class="p.type === 'B' ? 'bg-blue-500' : 'bg-pink-500'" x-text="p.id"></span>
                                    <div>
                                        <h4 class="font-bold text-xs text-gray-800" x-text="p.group"></h4>
                                        <p class="text-[10px] text-gray-400 font-medium" x-text="p.type === 'B' ? 'Nomor Seri Biru' : 'Nomor Seri Pink'"></p>
                                    </div>
                                </div>
                                <span class="text-[10px] font-bold bg-gray-100 text-gray-500 px-2 py-1 rounded-md" x-text="p.status"></span>
                            </div>
                        </template>
                        <template x-if="filteredParticipants.length === 0">
                            <p class="text-center text-xs text-gray-400 py-8">Data peserta tidak ditemukan.</p>
                        </template>
                    </div>
                </div>

                <div x-show="currentTab === 'rundown'" class="space-y-4">
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border">
                        <span class="text-xs font-bold text-gray-600">Agenda & Timeline Acara</span>
                        <button x-show="isAdmin && !isEditRundownMode" @click="isEditRundownMode = true" class="text-[10px] bg-indigo-50 text-indigo-600 border border-indigo-200 font-bold px-2 py-1 rounded-md">📝 Edit Rundown</button>
                        <div x-show="isEditRundownMode" class="flex gap-1">
                            <button @click="saveRundown()" class="text-[10px] bg-green-600 text-white font-bold px-2 py-1 rounded-md">Simpan</button>
                            <button @click="isEditRundownMode = false; fetchAllData();" class="text-[10px] bg-gray-400 text-white font-bold px-2 py-1 rounded-md">Batal</button>
                        </div>
                    </div>

                    <div class="relative border-l-2 border-indigo-100 ml-3.5 pl-5 space-y-5">
                        <template x-for="(item, idx) in rundown" :key="idx">
                            <div class="relative">
                                <span class="absolute -left-[27px] top-0.5 bg-indigo-600 text-white text-[9px] font-black h-3.5 w-3.5 rounded-full flex items-center justify-center ring-4 ring-white shadow-sm"></span>
                                
                                <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm space-y-1">
                                    <div class="flex justify-between items-center">
                                        <span class="text-[10px] font-bold text-indigo-600 tracking-wide" x-text="'Hari ' + item.day"></span>
                                        <template x-if="!isEditRundownMode">
                                            <span class="text-[10px] bg-indigo-50 text-indigo-700 font-bold px-2 py-0.5 rounded-md" x-text="item.time"></span>
                                        </template>
                                        <template x-if="isEditRundownMode">
                                            <input type="text" x-model="item.time" class="text-[10px] font-bold border rounded px-1.5 py-0.5 text-right w-20" />
                                        </template>
                                    </div>
                                    
                                    <template x-if="!isEditRundownMode">
                                        <p class="text-xs font-semibold text-gray-700 leading-relaxed" x-text="item.activity"></p>
                                    </template>
                                    <template x-if="isEditRundownMode">
                                        <textarea x-model="item.activity" rows="2" class="w-full text-xs p-1.5 border rounded-lg focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
                                    </template>
                                    
                                    <button x-show="isEditRundownMode" @click="rundown.splice(idx, 1)" class="text-[9px] text-red-500 font-bold block pt-1 hover:underline">🗑️ Hapus Baris</button>
                                </div>
                            </div>
                        </template>
                    </div>
                    
                    <button x-show="isEditRundownMode" @click="rundown.push({ day: '1', time: '00:00', activity: 'Aktivitas Baru' })" class="w-full py-2 bg-dashed border-2 border-dashed border-gray-300 rounded-xl text-xs font-bold text-gray-500 hover:bg-gray-50">+ Tambah Item Rundown</button>
                </div>

                <div x-show="currentTab === 'ovt_soal'" class="space-y-4">
                    
                    <div x-show="isAdmin" class="flex border-b text-xs font-bold mb-2">
                        <button @click="ovtAdminSubTab = 'bank'" :class="ovtAdminSubTab === 'bank' ? 'border-b-2 border-blue-500 text-blue-600' : 'text-gray-400'" class="flex-1 py-2.5 text-center">Kelola Bank Soal</button>
                        <button @click="ovtAdminSubTab = 'review_dashboard'" :class="ovtAdminSubTab === 'review_dashboard' ? 'border-b-2 border-blue-500 text-blue-600' : 'text-gray-400'" class="flex-1 py-2.5 text-center">Dashboard Review Kelompok</button>
                        <button @click="ovtAdminSubTab = 'preview_form'; syncOvtSubmitForm();" :class="ovtAdminSubTab === 'preview_form' ? 'border-b-2 border-blue-500 text-blue-600' : 'text-gray-400'" class="flex-1 py-2.5 text-center">Preview Form Peserta</button>
                    </div>

                    <div x-show="isAdmin && ovtAdminSubTab === 'bank'" class="space-y-4">
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
                            <h3 class="text-xs font-bold text-slate-700 uppercase tracking-wider" x-text="isEditOvtSoalMode ? '📝 Edit Soal Cerita' : '✨ Tambah Soal Cerita Baru'"></h3>
                            <div class="space-y-2">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Narasi Kasus / Cerita</label>
                                    <textarea x-model="ovtSoalForm.story" rows="4" placeholder="Tuliskan cerita studi kasus di sini..." class="w-full text-xs p-2.5 border rounded-xl focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Pertanyaan 1</label>
                                    <input type="text" x-model="ovtSoalForm.q1" placeholder="Masukkan pertanyaan pertama..." class="w-full text-xs p-2 border rounded-xl" />
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Pertanyaan 2</label>
                                    <input type="text" x-model="ovtSoalForm.q2" placeholder="Masukkan pertanyaan kedua..." class="w-full text-xs p-2 border rounded-xl" />
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Pertanyaan 3</label>
                                    <input type="text" x-model="ovtSoalForm.q3" placeholder="Masukkan pertanyaan ketiga..." class="w-full text-xs p-2 border rounded-xl" />
                                </div>
                            </div>
                            <div class="flex gap-2 pt-1">
                                <button @click="submitOvtSoalCrud()" class="flex-1 text-white text-xs font-bold py-2 rounded-xl uppercase tracking-wider" :class="isEditOvtSoalMode ? 'bg-orange-600' : 'bg-indigo-600'" x-text="isEditOvtSoalMode ? 'Perbarui Soal' : 'Simpan Soal Baru'"></button>
                                <button x-show="isEditOvtSoalMode" @click="resetOvtSoalForm()" class="bg-gray-400 text-white text-xs font-bold px-4 py-2 rounded-xl">Batal</button>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <template x-for="(soal, sIdx) in ovtSoalList" :key="soal.storyId">
                                <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-2">
                                    <div class="flex justify-between items-start border-b pb-1.5">
                                        <span class="text-xs font-bold text-gray-800" x-text="'ID Soal: #' + soal.storyId"></span>
                                        <div class="flex gap-2">
                                            <button @click="loadEditOvtSoal(soal)" class="text-[10px] font-bold text-indigo-600 hover:underline">Edit</button>
                                            <button @click="deleteOvtSoal(soal.storyId)" class="text-[10px] font-bold text-red-500 hover:underline">Hapus</button>
                                        </div>
                                    </div>
                                    <p class="text-xs text-gray-600 font-medium whitespace-pre-line" x-text="soal.story"></p>
                                    <div class="bg-slate-50 p-2.5 rounded-lg text-[11px] font-medium text-slate-500 space-y-1">
                                        <p x-show="soal.q1" x-text="'Q1: ' + soal.q1"></p>
                                        <p x-show="soal.q2" x-text="'Q2: ' + soal.q2"></p>
                                        <p x-show="soal.q3" x-text="'Q3: ' + soal.q3"></p>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div x-show="(isAdmin && ovtAdminSubTab === 'review_dashboard') || !isAdmin" class="space-y-4">
                        <div class="bg-gradient-to-r from-blue-900 to-slate-900 text-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                            <div>
                                <h2 class="text-sm font-bold uppercase tracking-wide">Review Lembar Konsensus</h2>
                                <p class="text-[11px] text-blue-200/90 mt-0.5">Lihat mufakat kelompok lain dan berikan apresiasi Mantep! 👍</p>
                            </div>
                            <span class="text-xs bg-blue-500/30 text-blue-200 px-2 py-1 rounded-lg font-bold" x-text="Object.keys(groupedOvtSubmissions).length + ' Grup'"></span>
                        </div>

                        <div x-show="!isAdmin" class="text-right">
                            <button @click="ovtAdminSubTab = 'preview_form'; syncOvtSubmitForm();" class="text-xs text-indigo-600 font-bold bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100 hover:bg-indigo-100">
                                ✍️ Isi Jawaban Kelompokmu
                            </button>
                        </div>

                        <div class="space-y-3">
                            <template x-for="(stories, groupName) in groupedOvtSubmissions" :key="groupName">
                                <div class="border border-gray-200 rounded-2xl overflow-hidden bg-white shadow-sm">
                                    
                                    <div @click="toggleAccordion(groupName)" class="bg-gray-50 p-4 flex justify-between items-center cursor-pointer select-none border-b border-gray-100 active:bg-gray-100/50 transition-colors">
                                        <div class="space-y-0.5">
                                            <h4 class="font-bold text-sm text-gray-800" x-text="groupName"></h4>
                                            <p class="text-[10px] text-gray-400 font-medium max-w-[260px] truncate" x-text="'Hadir: ' + stories[0].membersString"></p>
                                        </div>
                                        <div class="flex items-center gap-3 shrink-0">
                                            <div class="flex items-center gap-1 bg-amber-50 text-amber-600 font-bold px-2 py-1 rounded-lg border border-amber-100 text-xs">
                                                👍 <span x-text="ovtReviewMap[groupName] || 0">0</span>
                                            </div>
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400 transform duration-200" :class="accordionState[groupName] ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                                            </svg>
                                        </div>
                                    </div>

                                    <div x-show="accordionState[groupName]" x-transition class="p-4 bg-white space-y-4 border-b border-gray-100">
                                        <template x-for="(sub, sIdx) in stories" :key="sub.storyId">
                                            <div class="space-y-3 border-b pb-4 last:border-0 last:pb-0">
                                                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-0.5" x-text="'Skenario Kasus #' + (sIdx + 1)"></span>
                                                    <p class="text-xs text-gray-700 font-medium whitespace-pre-line" x-text="sub.story"></p>
                                                </div>

                                                <div class="space-y-1 pl-1" x-show="sub.a1">
                                                    <p class="text-[11px] font-bold text-blue-600" x-text="'Q1: ' + getQuestionText(sub.storyId, 'q1')"></p>
                                                    <p class="text-xs text-gray-800 bg-blue-50/30 border border-blue-100/30 p-2.5 rounded-xl font-medium whitespace-pre-line" x-text="sub.a1"></p>
                                                </div>
                                                <div class="space-y-1 pl-1" x-show="sub.a2">
                                                    <p class="text-[11px] font-bold text-blue-600" x-text="'Q2: ' + getQuestionText(sub.storyId, 'q2')"></p>
                                                    <p class="text-xs text-gray-800 bg-blue-50/30 border border-blue-100/30 p-2.5 rounded-xl font-medium whitespace-pre-line" x-text="sub.a2"></p>
                                                </div>
                                                <div class="space-y-1 pl-1" x-show="sub.a3">
                                                    <p class="text-[11px] font-bold text-blue-600" x-text="'Q3: ' + getQuestionText(sub.storyId, 'q3')"></p>
                                                    <p class="text-xs text-gray-800 bg-blue-50/30 border border-blue-100/30 p-2.5 rounded-xl font-medium whitespace-pre-line" x-text="sub.a3"></p>
                                                </div>
                                            </div>
                                        </template>

                                        <div class="pt-2">
                                            <button @click="incrementMantep(groupName)" :disabled="isLoading"
                                                class="w-full py-2.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl text-xs font-bold uppercase tracking-wider shadow-sm flex items-center justify-center gap-2 active:scale-[0.99] transition-transform disabled:opacity-50">
                                                <span>👍 MANTEP!</span>
                                                <span class="bg-white/20 px-2 py-0.5 rounded-md" x-text="(ovtReviewMap[groupName] || 0) + ' Upvotes'"></span>
                                            </button>
                                        </div>
                                    </div>

                                </div>
                            </template>

                            <template x-if="Object.keys(groupedOvtSubmissions).length === 0">
                                <p class="text-center text-xs text-gray-400 py-12 font-medium bg-gray-50 rounded-2xl border border-dashed">Belum ada kelompok yang mengirimkan lembar tanggapan.</p>
                            </template>
                        </div>
                    </div>

                    <div x-show="!isAdmin && ovtAdminSubTab === 'preview_form'" class="space-y-4">
                        <div class="flex justify-between items-center">
                            <button @click="ovtAdminSubTab = 'review_dashboard'" class="text-xs font-bold text-gray-500 flex items-center gap-1">
                                ← Kembali ke Review
                            </button>
                        </div>

                        <div class="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm space-y-4">
                            <div class="border-b pb-3">
                                <h3 class="text-sm font-bold text-gray-800">Lembar Jawaban Overthink</h3>
                                <p class="text-[11px] text-gray-400 font-medium">Input konsensus musyawarah kelompok kerja anda.</p>
                            </div>

                            <div class="grid grid-cols-2 gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase mb-1">Grup Diskusi</label>
                                    <select x-model="ovtSubmitForm.groupName" class="w-full text-xs font-bold p-2 border bg-white rounded-lg">
                                        <option value="">-- Pilih --</option>
                                        <template x-for="gNum in Array.from({length: 31}, (_, i) => i + 1)">
                                            <option :value="'Grup ' + (gNum < 10 ? '0' + gNum : gNum)" x-text="'Grup ' + (gNum < 10 ? '0' + gNum : gNum)"></option>
                                        </template>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase mb-1">Total Anggota Hadir</label>
                                    <select x-model.number="ovtSubmitForm.memberCount" @change="adjustMembersArray()" class="w-full text-xs font-bold p-2 border bg-white rounded-lg">
                                        <template x-for="c in Array.from({length: 10}, (_, i) => i + 1)">
                                            <option :value="c" x-text="c + ' Orang'"></option>
                                        </template>
                                    </select>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wide">ID Anggota Kelompok yang Hadir:</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <template x-for="(m, idx) in ovtSubmitForm.members" :key="idx">
                                        <div class="flex items-center gap-1.5 border p-1.5 rounded-xl bg-gray-50">
                                            <span class="text-[9px] font-bold text-gray-400 bg-white border px-1.5 py-0.5 rounded-md" x-text="idx+1"></span>
                                            <input type="text" x-model="ovtSubmitForm.members[idx]" placeholder="Contoh: B21" class="w-full text-xs p-1 bg-transparent border-none uppercase font-bold text-gray-800 focus:outline-none focus:ring-0" />
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <div class="space-y-4 pt-2">
                                <template x-for="(soal, sIdx) in ovtSoalList" :key="soal.storyId">
                                    <div class="border border-slate-100 rounded-xl overflow-hidden bg-white shadow-sm">
                                        <div class="bg-slate-800 text-white p-3">
                                            <span class="text-[9px] font-black uppercase bg-indigo-500/30 text-indigo-200 px-2 py-0.5 rounded" x-text="'KASUS #' + (sIdx + 1)"></span>
                                            <p class="text-xs mt-1.5 font-medium leading-relaxed whitespace-pre-line" x-text="soal.story"></p>
                                        </div>
                                        <div class="p-3 space-y-3">
                                            <div class="space-y-1" x-show="soal.q1">
                                                <label class="block text-[11px] font-bold text-indigo-600" x-text="'Q1: ' + soal.q1"></label>
                                                <textarea x-model="ovtSubmitForm.answers[soal.storyId].a1" rows="2" placeholder="Ketik kesimpulan kelompok..." class="w-full text-xs p-2 border rounded-xl focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
                                            </div>
                                            <div class="space-y-1" x-show="soal.q2">
                                                <label class="block text-[11px] font-bold text-indigo-600" x-text="'Q2: ' + soal.q2"></label>
                                                <textarea x-model="ovtSubmitForm.answers[soal.storyId].a2" rows="2" placeholder="Ketik kesimpulan kelompok..." class="w-full text-xs p-2 border rounded-xl focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
                                            </div>
                                            <div class="space-y-1" x-show="soal.q3">
                                                <label class="block text-[11px] font-bold text-indigo-600" x-text="'Q3: ' + soared.q3"></label>
                                                <textarea x-model="ovtSubmitForm.answers[soal.storyId].a3" rows="2" placeholder="Ketik kesimpulan kelompok..." class="w-full text-xs p-2 border rounded-xl focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <div class="pt-2">
                                <button @click="submitOvtJawabanKelompok()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white text-xs font-bold py-3 rounded-xl uppercase tracking-wider shadow-md active:scale-[0.99] transition-transform">
                                    🚀 Kirim Lembar Tanggapan Kelompok
                                </button>
                            </div>
                        </div>
                    </div>

                </div>

            </main>

            <nav class="fixed bottom-0 mobile-container w-full border-t bg-white z-40 flex h-16 shadow-[0_-2px_10px_rgba(0,0,0,0.03)]">
                <button @click="currentTab = 'generator'" class="flex-1 flex flex-col justify-center items-center gap-1 transition-colors"
                    :class="currentTab === 'generator' ? 'text-indigo-600 font-bold' : 'text-gray-400 font-medium'">
                    <span class="text-lg">🎲</span>
                    <span class="text-[10px]">Acak Kelompok</span>
                </button>
                <button @click="currentTab = 'rundown'" class="flex-1 flex flex-col justify-center items-center gap-1 transition-colors"
                    :class="currentTab === 'rundown' ? 'text-indigo-600 font-bold' : 'text-gray-400 font-medium'">
                    <span class="text-lg">📅</span>
                    <span class="text-[10px]">Rundown</span>
                </button>
                <button @click="currentTab = 'ovt_soal'" class="flex-1 flex flex-col justify-center items-center gap-1 transition-colors"
                    :class="currentTab === 'ovt_soal' ? 'text-indigo-600 font-bold' : 'text-gray-400 font-medium'">
                    <span class="text-lg">🧠</span>
                    <span class="text-[10px]">Overthink</span>
                </button>
            </nav>

        </div>

        <script>
            function app() {
                return {
                    apiUrl: "YOUR_WEB_APP_URL_HERE", // GANTI dengan tautan eksekusi macro Apps Script Anda
                    currentTab: "generator",
                    ovtAdminSubTab: "review_dashboard",
                    isAdmin: false,
                    adminPassword: "",
                    isLoading: false,
                    dataVersion: 0,
                    searchQuery: "",
                    
                    // Main Data Pools
                    participants: [],
                    config: { title: "Acak Grup Event", totalBlue: 43, totalPink: 61, rule: 6, excludeBlue: "", excludePink: "", dataVersion: 0 },
                    rundown: [],
                    ovtSoalList: [],
                    ovtSubmitList: [],
                    ovtReviewMap: {},
                    
                    // Accordion Open/Close State
                    accordionState: {},
                    
                    // Form States
                    swapP1: "",
                    swapP2: "",
                    isEditRundownMode: false,
                    isEditOvtSoalMode: false,
                    
                    ovtSoalForm: { storyId: "", story: "", q1: "", q2: "", q3: "" },
                    ovtSubmitForm: { groupName: "", memberCount: 3, members: ["", "", ""], answers: {} },

                    init() {
                        this.fetchAllData();
                        // Polling background setiap 15 detik untuk memantau sinkronisasi upvote & pengisian
                        setInterval(() => { this.silentlyCheckVersion(); }, 15000);
                    },

                    async fetchAllData() {
                        this.isLoading = true;
                        try {
                            const res = await fetch(this.apiUrl);
                            const resJson = await res.json();
                            if (resJson.status === "success") {
                                const d = resJson.data;
                                this.participants = d.participants;
                                this.config = d.config;
                                this.rundown = d.rundown;
                                this.ovtSoalList = d.ovtSoalList;
                                this.ovtSubmitList = d.ovtSubmitList;
                                this.ovtReviewMap = d.ovtReviewMap || {};
                                this.dataVersion = d.config.dataVersion;
                                this.syncOvtSubmitForm();
                            }
                        } catch (e) {
                            console.error("Gagal memuat repositori data internal server.", e);
                        } finally {
                            this.isLoading = false;
                        }
                    },

                    async silentlyCheckVersion() {
                        try {
                            const res = await fetch(this.apiUrl);
                            const resJson = await res.json();
                            if (resJson.status === "success" && resJson.data.config.dataVersion !== this.dataVersion) {
                                const d = resJson.data;
                                this.participants = d.participants;
                                this.config = d.config;
                                this.rundown = d.rundown;
                                this.ovtSoalList = d.ovtSoalList;
                                this.ovtSubmitList = d.ovtSubmitList;
                                this.ovtReviewMap = d.ovtReviewMap || {};
                                this.dataVersion = d.config.dataVersion;
                            }
                        } catch (err) {
                            console.log("Silent version check failed:", err);
                        }
                    },

                    get filteredParticipants() {
                        if (!this.searchQuery.trim()) return this.participants;
                        const q = this.searchQuery.trim().toLowerCase();
                        return this.participants.filter(p => p.id.toLowerCase().includes(q) || p.group.toLowerCase().includes(q));
                    },

                    get groupedOvtSubmissions() {
                        const groups = {};
                        this.ovtSubmitList.forEach(item => {
                            if (!groups[item.groupName]) { groups[item.groupName] = []; }
                            groups[item.groupName].push(item);
                        });
                        return groups;
                    },

                    toggleAccordion(groupName) {
                        this.accordionState[groupName] = !this.accordionState[groupName];
                    },

                    getQuestionText(storyId, field) {
                        const found = this.ovtSoalList.find(s => s.storyId.toString() === storyId.toString());
                        return found ? found[field] : "Pertanyaan:";
                    },

                    toggleAdminMode() {
                        if (this.isAdmin) {
                            this.isAdmin = false;
                            this.adminPassword = "";
                            this.ovtAdminSubTab = "review_dashboard";
                        } else {
                            const p = prompt("Masukkan Kata Sandi Otoritas Admin:");
                            if (p === null) return;
                            if (!p) { alert("Sandi tidak boleh kosong!"); return; }
                            
                            this.isLoading = true;
                            fetch(this.apiUrl, {
                                method: "POST",
                                body: JSON.stringify({ action: "CHECK_PASSWORD", password: p })
                            }).then(r => r.json()).then(res => {
                                if (res.status === "success") {
                                    this.isAdmin = true;
                                    this.adminPassword = p;
                                    this.ovtAdminSubTab = "bank";
                                } else {
                                    alert(res.message);
                                }
                            }).catch(() => alert("Koneksi gagal.")).finally(() => this.isLoading = false);
                        }
                    },

                    async incrementMantep(groupName) {
                        this.isLoading = true;
                        try {
                            const response = await fetch(this.apiUrl, {
                                method: "POST",
                                body: JSON.stringify({
                                    action: "MANTEP_INCREMENT",
                                    groupName: groupName
                                })
                            });
                            const result = await response.json();
                            if (result.status === "success") {
                                this.ovtReviewMap[groupName] = result.currentCount;
                                this.dataVersion = result.dataVersion;
                            } else {
                                alert(result.message);
                            }
                        } catch (error) {
                            alert("Gagal mengirim data upvote.");
                        } finally {
                            this.isLoading = false;
                        }
                    },

                    syncOvtSubmitForm() {
                        this.ovtSubmitForm.answers = {};
                        this.ovtSoalList.forEach(s => {
                            this.ovtSubmitForm.answers[s.storyId] = { storyId: s.storyId, story: s.story, a1: "", a2: "", a3: "" };
                        });
                    },

                    adjustMembersArray() {
                        const target = this.ovtSubmitForm.memberCount;
                        while (this.ovtSubmitForm.members.length < target) this.ovtSubmitForm.members.push("");
                        if (this.ovtSubmitForm.members.length > target) this.ovtSubmitForm.members = this.ovtSubmitForm.members.slice(0, target);
                    },

                    async submitOvtJawabanKelompok() {
                        if (!this.ovtSubmitForm.groupName) { alert("Pilih Nama Grup Kerja Anda Terlebih Dahulu!"); return; }
                        
                        const filledIds = this.ovtSubmitForm.members.map(m => m.trim().toUpperCase()).filter(m => m !== "");
                        if (filledIds.length === 0) { alert("Minimal isi satu ID anggota kelompok yang hadir!"); return; }

                        const membersString = filledIds.join(", ");
                        const payloadData = [];
                        
                        for (const key in this.ovtSubmitForm.answers) {
                            const ans = this.ovtSubmitForm.answers[key];
                            payloadData.push({
                                groupName: this.ovtSubmitForm.groupName,
                                membersString: membersString,
                                storyId: ans.storyId,
                                story: ans.story,
                                a1: ans.a1,
                                a2: ans.a2,
                                a3: ans.a3
                            });
                        }

                        this.isLoading = true;
                        try {
                            const response = await fetch(this.apiUrl, {
                                method: "POST",
                                body: JSON.stringify({ action: "SUBMIT_OVT_JAWABAN", submitData: payloadData })
                            });
                            const result = await response.json();
                            alert(result.message);
                            if (result.status === "success") {
                                this.dataVersion = result.dataVersion;
                                this.ovtSubmitForm.groupName = "";
                                this.syncOvtSubmitForm();
                                this.ovtAdminSubTab = "review_dashboard";
                                this.fetchAllData();
                            }
                        } catch (e) {
                            alert("Gagal mendistribusikan berkas formulir ke cloud spreadsheet.");
                        } finally {
                            this.isLoading = false;
                        }
                    },

                    async submitOvtSoalCrud() {
                        if (!this.ovtSoalForm.story.trim()) { alert("Naratif teks cerita tidak boleh kosong!"); return; }
                        
                        const actionType = this.isEditOvtSoalMode ? "UPDATE" : "CREATE";
                        this.isLoading = true;
                        try {
                            const res = await fetch(this.apiUrl, {
                                method: "POST",
                                body: JSON.stringify({
                                    password: this.adminPassword,
                                    action: "CRUD_OVT_SOAL",
                                    subAction: actionType,
                                    soalData: this.ovtSoalForm
                                })
                            });
                            const result = await res.json();
                            alert(result.message);
                            if (result.status === "success") {
                                this.dataVersion = result.dataVersion;
                                this.resetOvtSoalForm();
                                this.fetchAllData();
                            }
                        } catch (e) {
                            alert("Gagal memproses manajemen bank soal.");
                        } finally {
                            this.isLoading = false;
                        }
                    },

                    loadEditOvtSoal(soal) {
                        this.isEditOvtSoalMode = true;
                        this.ovtSoalForm = { storyId: soal.storyId, story: soal.story, q1: soal.q1, q2: soal.q2, q3: soal.q3 };
                    },

                    resetOvtSoalForm() {
                        this.isEditOvtSoalMode = false;
                        this.ovtSoalForm = { storyId: "", story: "", q1: "", q2: "", q3: "" };
                    },

                    async deleteOvtSoal(id) {
                        if (!confirm("Apakah anda yakin ingin melenyapkan soal cerita ini dari database?")) return;
                        this.isLoading = true;
                        try {
                            const res = await fetch(this.apiUrl, {
                                method: "POST",
                                body: JSON.stringify({
                                    password: this.adminPassword,
                                    action: "CRUD_OVT_SOAL",
                                    subAction: "DELETE",
                                    soalData: { storyId: id }
                                })
                            });
                            const result = await res.json();
                            alert(result.message);
                            if (result.status === "success") {
                                this.dataVersion = result.dataVersion;
                                this.fetchAllData();
                            }
                        } catch (e) {
                            alert("Koneksi bermasalah.");
                        } finally {
                            this.isLoading = false;
                        }
                    },

                    async executeSwap() {
                        if (!this.swapP1 || !this.swapP2) { alert("Isi kedua ID Peserta terlebih dahulu!"); return; }
                        this.isLoading = true;
                        try {
                            const response = await fetch(this.apiUrl, {
                                method: "POST",
                                body: JSON.stringify({
                                    password: this.adminPassword,
                                    action: "SWAP",
                                    swapData: { p1: this.swapP1.trim().toUpperCase(), p2: this.swapP2.trim().toUpperCase() }
                                })
                            });
                            const result = await response.json();
                            alert(result.message);
                            if (result.status === "success") {
                                this.swapP1 = "";
                                this.swapP2 = "";
                                this.fetchAllData();
                            }
                        } catch (e) {
                            alert("Koneksi gagal.");
                        } finally {
                            this.isLoading = false;
                        }
                    },

                    async generateGroups() {
                        if (!confirm("PERINGATAN! Melakukan pengacakan ulang akan menghapus semua data penempatan kelompok saat ini. Lanjutkan?")) return;
                        this.isLoading = true;
                        try {
                            const response = await fetch(this.apiUrl, {
                                method: "POST",
                                body: JSON.stringify({
                                    password: this.adminPassword,
                                    action: "GENERATE",
                                    config: this.config
                                })
                            });
                            const result = await response.json();
                            if (result.status === "success") {
                                this.dataVersion = result.dataVersion;
                                this.fetchAllData();
                                alert("Data kelompok berhasil dikocok ulang secara adil!");
                            } else {
                                alert(result.message);
                            }
                        } catch (error) {
                            alert("Gagal memproses pengacakan.");
                        } finally {
                            this.isLoading = false;
                        }
                    },

                    async saveRundown() {
                        this.isLoading = true;
                        try {
                            const response = await fetch(this.apiUrl, {
                                method: "POST",
                                body: JSON.stringify({
                                    password: this.adminPassword,
                                    action: "SAVE_RUNDOWN",
                                    rundown: this.rundown
                                })
                            });
                            const result = await response.json();
                            alert(result.message);
                            if (result.status === "success") {
                                this.dataVersion = result.dataVersion;
                                this.isEditRundownMode = false;
                            }
                        } catch (error) {
                            alert("Gagal menyimpan Rundown ke server.");
                        } finally {
                            this.isLoading = false;
                        }
                    }
                };
            }
        </script>
    </body>
</html>
